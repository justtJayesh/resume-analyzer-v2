{% extends "base.html" %}

{% block title %}Register - CVNest{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Register</h1>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Choose a username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Choose a password (min 4 characters)">

        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="Confirm your password">

        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>
{% endblock %}
